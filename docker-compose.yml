services:
  mysql:
    image: mysql:8.0
    container_name: inventario_mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: inventario_db
      MYSQL_USER: inventario_user
      MYSQL_PASSWORD: inventario_pass
      LANG: C.UTF-8
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/02-grants.sql:/docker-entrypoint-initdb.d/02-grants.sql:ro
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "-proot_password", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  db-setup:
    image: mysql:8.0
    container_name: inventario_db_setup
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        echo "Esperando a que MySQL acepte conexiones de red..."
        for i in $(seq 1 30); do
          if mysql -h mysql -u root -proot_password -e "SELECT 1" >/dev/null 2>&1; then
            break
          fi
          echo "Intento $$i/30..."
          sleep 2
        done
        mysql -h mysql -u root -proot_password -e "SELECT 1" >/dev/null 2>&1 || {
          echo "No se pudo conectar a MySQL"
          exit 1
        }
        echo "Configurando permisos de MySQL..."
        mysql --default-character-set=utf8mb4 -h mysql -u root -proot_password <<-EOSQL
          SET NAMES utf8mb4;
          CREATE DATABASE IF NOT EXISTS inventario_db
            CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          ALTER DATABASE inventario_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'inventario_user'@'%' IDENTIFIED BY 'inventario_pass';
          GRANT ALL PRIVILEGES ON inventario_db.* TO 'inventario_user'@'%';
          USE inventario_db;
          ALTER TABLE productos CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          ALTER TABLE almacenes CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          ALTER TABLE inventario CONVERT TO CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          FLUSH PRIVILEGES;
        EOSQL
        echo "Permisos configurados correctamente."

  api:
    build: .
    container_name: inventario_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: inventario_user
      DB_PASSWORD: inventario_pass
      DB_NAME: inventario_db
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONUTF8: "1"
    depends_on:
      db-setup:
        condition: service_completed_successfully

volumes:
  mysql_data:
